spring.application.name=oby-backend

# Database Configuration
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:obydb}?TimeZone=UTC
spring.datasource.username=${DB_USER:obyuser}
spring.datasource.password=${DB_PASSWORD:obypass123}
spring.datasource.driver-class-name=org.postgresql.Driver

# Timezone Configuration (UTC)
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# schema initialization
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.mode=always

# OpenAPI / Swagger Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Storage Configuration
storage.type=${STORAGE_TYPE:minio}

# MinIO Configuration (Development)
storage.minio.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
storage.minio.access-key=${MINIO_ACCESS_KEY:minioadmin}
storage.minio.secret-key=${MINIO_SECRET_KEY:minioadmin}
storage.minio.bucket=${MINIO_BUCKET:oby-bucket}

# AWS S3 Configuration (Production)
storage.s3.region=${AWS_REGION:ap-northeast-1}
storage.s3.bucket=${AWS_S3_BUCKET:oby-production}
storage.s3.access-key=${AWS_ACCESS_KEY_ID:}
storage.s3.secret-key=${AWS_SECRET_ACCESS_KEY:}

# Google OAuth2 Configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri=${BACKEND_URL:http://localhost:8080}/login/oauth2/code/google

# Application URL Configuration
app.frontend.url=${FRONTEND_URL:http://localhost:5173}
app.backend.url=${BACKEND_URL:http://localhost:8080}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Logging Configuration
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
